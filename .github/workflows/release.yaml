name: Publish to PyPI

on:
  release:
    types:
      - created

jobs:
  release:
    name: "Publish release"
    runs-on: ubuntu-latest

    steps:
      - uses: "actions/checkout@v4"
      - uses: "astral-sh/setup-uv@v5"
      - name: "Build and publish to PyPI"
        run: "./scripts/release.sh"
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
